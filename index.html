<!DOCTYPE html>
<html>
<head>
    <title>Customer Page</title>
</head>
<body>

    <!-- Heading -->
    <h1>Welcome to Our Service</h1>

    <!-- Paragraph + Italics -->
    <p>
        We are happy to have you here. 
        <i>Please fill the form below</i> to get started.
    </p>

    <!-- Break -->
    <br>

    <!-- Link -->
    <a href="https://www.jumia.com.ng/catalog/?q=phones">Visit Jumia</a>

    <br><br>

    <!-- Image -->
    <img src="phone.jpg" alt="Sample Image">

    <br><br>

    <!-- Form -->
    <h2>Customer Information Form</h2>

    <form action="dashboard.html">
        <label>Customer Name:</label><br>
        <input type="text" placeholder="Enter your name" required><br><br>

        <label>Email Address:</label><br>
        <input type="email" placeholder="Enter your email" required><br><br>

        <label>Phone Number:</label><br>
        <input type="number" placeholder="Enter your phone number" required><br><br>

        <!-- Button -->
        <button type="submit">Submit</button>
    </form>

</body>
</html>
